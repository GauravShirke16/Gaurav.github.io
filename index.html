<!-- ADD THIS INSIDE <head> AFTER YOUR STYLE -->

<style>

/* ====== SMOOTH CALM BACKGROUND ====== */
body {
  background: linear-gradient(270deg, #080c0f, #0d1318, #111920);
  background-size: 600% 600%;
  animation: gradientShift 20s ease infinite;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Floating particles */
body::after {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,229,160,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: floatParticles 60s linear infinite;
  z-index: 0;
}

@keyframes floatParticles {
  0% { transform: translateY(0); }
  100% { transform: translateY(-200px); }
}

/* ====== FIRE DRAGON ICON ====== */
.dragon {
  position: absolute;
  width: 24px;
  height: 24px;
  pointer-events: none;
  opacity: 0;
  transform: translateX(-10px);
  transition: all 0.3s ease;
}

/* simple dragon flame effect */
.dragon::before {
  content: "🐉";
  font-size: 18px;
  filter: drop-shadow(0 0 6px #ff4500);
  animation: fireMove 0.8s infinite alternate;
}

@keyframes fireMove {
  0% { transform: translateY(0) scale(1); }
  100% { transform: translateY(-2px) scale(1.1); }
}

/* SHOW DRAGON ON HOVER */
.btn-primary,
.btn-ghost,
.contact-item,
.exp-card {
  position: relative;
  overflow: hidden;
}

.btn-primary:hover .dragon,
.btn-ghost:hover .dragon,
.contact-item:hover .dragon,
.exp-card:hover .dragon {
  opacity: 1;
  transform: translateX(6px);
}

/* OPTIONAL: glow effect */
.btn-primary:hover,
.contact-item:hover,
.exp-card:hover {
  box-shadow: 0 0 12px rgba(255, 100, 0, 0.25);
}

</style>
